name: CD - Docker Hub & Deploy

on:
  workflow_run:
    workflows: ["Java CI with Maven"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
    - uses: actions/checkout@v4
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}
    
    - name: Build and push Nodify API
      run: |
        docker build -f Dockerfile-api -t ${{ secrets.DOCKER_USERNAME }}/nodify-api:latest .
        docker push ${{ secrets.DOCKER_USERNAME }}/nodify-api:latest
    
    - name: Build and push Nodify Core
      run: |
        docker build -f Dockerfile-core -t ${{ secrets.DOCKER_USERNAME }}/nodify-core:latest .
        docker push ${{ secrets.DOCKER_USERNAME }}/nodify-core:latest
    
    - name: Build and push Nodify Studio
      run: |
        docker build -f Dockerfile-ui -t ${{ secrets.DOCKER_USERNAME }}/nodify-studio:latest .
        docker push ${{ secrets.DOCKER_USERNAME }}/nodify-studio:latest
    
    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        script_stop: true
        script: |
          echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          cd /home/azirar/docker-compose/nodify
          docker compose pull
          docker compose up -d
          docker image prune -f
