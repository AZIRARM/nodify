name: Fetch and Process Nodes
on:
  repository_dispatch:
    types: [ssg-node]

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: headless-cms

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Process webhook payload
        env:
          API_URL: ${{ vars.NODIFY_API_URL }}
          NODE_CODE: ${{ github.event.client_payload.code }}
          ROOT_FOLDER: ${{ github.event.client_payload.folder }}
        run: |
          python3 << 'EOF'
          import json
          import os
          import subprocess
          import base64
          import re
          
          API_URL = os.environ.get('API_URL', '')
          NODE_CODE = os.environ.get('NODE_CODE', '')
          ROOT_FOLDER = os.environ.get('ROOT_FOLDER', '')
          
          print("=== START SSG GENERATOR ===")
          print(f"API_URL: {API_URL}")
          print(f"NODE_CODE: {NODE_CODE}")
          print(f"ROOT_FOLDER: {ROOT_FOLDER}")
          
          if not API_URL:
              print("ERROR: API_URL not set")
              exit(1)
          
          if not NODE_CODE or NODE_CODE == 'null':
              print("No node code")
              exit(0)
          
          base_dir = "docs"
          if ROOT_FOLDER:
              base_dir = os.path.join("docs", ROOT_FOLDER)
          
          print(f"Base directory: {base_dir}")
          os.makedirs(base_dir, exist_ok=True)
          
          def fetch_url(url):
              result = subprocess.run(['curl', '-s', url], capture_output=True, text=True)
              return result.stdout
          
          def detect_content_type(content):
              if isinstance(content, dict):
                  return 'json', content
              
              if not isinstance(content, str):
                  return 'unknown', content
              
              content_stripped = content.strip()
              
              if content_stripped.startswith('<!DOCTYPE html>') or content_stripped.startswith('<html'):
                  return 'html', content
              if content_stripped.startswith('<'):
                  return 'html', content
              if content_stripped.startswith('function') or 'function' in content_stripped[:50]:
                  return 'js', content
              if 'window.addEventListener' in content_stripped:
                  return 'js', content
              if content_stripped.startswith('{') and content_stripped.endswith('}'):
                  try:
                      json.loads(content_stripped)
                      return 'json', content
                  except:
                      pass
              if '{' in content_stripped and '}' in content_stripped:
                  return 'json', content
              if content_stripped.startswith('.') or content_stripped.startswith('body') or 'css' in content_stripped[:100]:
                  return 'css', content
              
              return 'unknown', content
          
          def save_content(content, output_dir, index, custom_name=None):
              content_type, payload = detect_content_type(content)
              
              if custom_name:
                  filename = custom_name
              else:
                  if content_type == 'html':
                      filename = f"index.html" if index == 0 else f"page_{index}.html"
                  elif content_type == 'css':
                      filename = f"style_{index}.css"
                  elif content_type == 'js':
                      filename = f"script_{index}.js"
                  elif content_type == 'json':
                      filename = f"data_{index}.json"
                  else:
                      filename = f"content_{index}.txt"
              
              filepath = os.path.join(output_dir, filename)
              os.makedirs(os.path.dirname(filepath) if os.path.dirname(filepath) else output_dir, exist_ok=True)
              
              if isinstance(payload, (dict, list)):
                  with open(filepath, 'w', encoding='utf-8') as f:
                      json.dump(payload, f, indent=2, ensure_ascii=False)
              else:
                  with open(filepath, 'w', encoding='utf-8') as f:
                      f.write(str(payload))
              
              print(f"  SAVED: {filepath} (type: {content_type})")
              return filename
          
          def fetch_node_contents(node_code, output_dir):
              url = f"{API_URL}/contents/node/code/{node_code}?fillValues=true&payloadOnly=true&withFiles=true"
              print(f"Fetching contents for node: {node_code}")
              print(f"Calling: {url}")
              
              response = fetch_url(url)
              if not response or response == 'null':
                  print(f"No contents found for node {node_code}")
                  return
              
              try:
                  contents = json.loads(response)
                  if not isinstance(contents, list):
                      contents = [contents]
                  
                  print(f"Found {len(contents)} content(s)")
                  
                  for idx, content in enumerate(contents):
                      # Vérifier si le contenu a un champ ssg=false
                      if isinstance(content, dict) and content.get('ssg') == False:
                          print(f"  SKIP: content {idx} (ssg=false)")
                          continue
                      
                      save_content(content, output_dir, idx)
                      
              except json.JSONDecodeError as e:
                  print(f"Error parsing contents: {e}")
          
          def process_node(node_code, current_dir):
              print(f"\n--- Processing node: {node_code} ---")
              
              url = f"{API_URL}/nodes/parent/{node_code}"
              print(f"Calling: {url}")
              
              response = fetch_url(url)
              if not response or response == 'null' or response == '[]':
                  print(f"No child nodes found for {node_code}")
                  fetch_node_contents(node_code, current_dir)
                  return
              
              try:
                  nodes = json.loads(response)
                  if isinstance(nodes, dict):
                      nodes = [nodes]
                  
                  print(f"Found {len(nodes)} child node(s)")
                  
                  for node in nodes:
                      child_code = node.get('code')
                      child_folder = node.get('folder')
                      node_name = node.get('name', child_code)
                      node_ssg = node.get('ssg', True)
                      
                      if not child_code:
                          continue
                      
                      if node_ssg is False or node_ssg == 'false':
                          print(f"  SKIP node: {node_name} ({child_code}) (ssg=false)")
                          continue
                      
                      if child_folder:
                          target_dir = os.path.join(current_dir, child_folder)
                      else:
                          target_dir = os.path.join(current_dir, node_name)
                      
                      print(f"  Child node: {node_name} ({child_code}) -> folder: {target_dir}")
                      os.makedirs(target_dir, exist_ok=True)
                      
                      fetch_node_contents(child_code, target_dir)
                      process_node(child_code, target_dir)
                      
              except json.JSONDecodeError as e:
                  print(f"Error parsing nodes: {e}")
                  fetch_node_contents(node_code, current_dir)
          
          print(f"\nFetching root node contents...")
          fetch_node_contents(NODE_CODE, base_dir)
          
          process_node(NODE_CODE, base_dir)
          
          print("\n=== END SSG GENERATOR ===")
          EOF

      - name: List saved files
        run: |
          echo "=== Files saved ==="
          find docs -type f 2>/dev/null | head -50
          echo "Total files in docs: $(find docs -type f 2>/dev/null | wc -l)"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout headless-cms || git checkout -b headless-cms
          git add docs/
          git status
          git diff --staged --quiet || git commit -m "Update nodes contents from webhook"
          git push origin headless-cms
          echo "Push completed"

      - name: Verify files on repo
        run: |
          echo "=== Verifying files after push ==="
          git pull origin headless-cms
          find docs -type f 2>/dev/null | head -20
