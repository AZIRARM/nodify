name: SSG Node Generator
on:
  repository_dispatch:
    types: [ssg-node]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: headless-cms

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate static site
        env:
          API_URL: ${{ vars.NODIFY_API_URL }}
          NODE_CODE: ${{ github.event.client_payload.code }}
          ROOT_FOLDER: ${{ github.event.client_payload.folder }}
        run: |
          python3 << 'EOF'
          import json
          import os
          import subprocess
          import base64
          
          API_URL = os.environ.get('API_URL', '')
          NODE_CODE = os.environ.get('NODE_CODE', '')
          ROOT_FOLDER = os.environ.get('ROOT_FOLDER', '')
          
          print("=== SSG NODE GENERATOR ===")
          print(f"API_URL: {API_URL}")
          print(f"NODE_CODE: {NODE_CODE}")
          print(f"ROOT_FOLDER: {ROOT_FOLDER}")
          
          if not API_URL:
              print("ERROR: API_URL not set")
              exit(1)
          
          if not NODE_CODE or NODE_CODE == 'null':
              print("No node code")
              exit(0)
          
          base_dir = os.path.join("docs", ROOT_FOLDER) if ROOT_FOLDER else "docs"
          print(f"Base directory: {base_dir}")
          os.makedirs(base_dir, exist_ok=True)
          
          def fetch_url(url):
              result = subprocess.run(['curl', '-s', url], capture_output=True, text=True)
              return result.stdout
          
          def save_content(payload, output_dir, filename):
              filepath = os.path.join(output_dir, filename)
              os.makedirs(os.path.dirname(filepath) if os.path.dirname(filepath) else output_dir, exist_ok=True)
              
              if isinstance(payload, (dict, list)):
                  with open(filepath, 'w', encoding='utf-8') as f:
                      json.dump(payload, f, indent=2, ensure_ascii=False)
              else:
                  with open(filepath, 'w', encoding='utf-8') as f:
                      f.write(str(payload))
              
              print(f"  SAVED: {filepath}")
          
          def process_node(node_code, output_dir):
              print(f"\n=== Processing node: {node_code} ===")
              print(f"Output directory: {output_dir}")
              
              # 1. Récupérer les contenus du nœud
              url = f"{API_URL}/contents/node/code/{node_code}?fillValues=true&payloadOnly=true&withFiles=true"
              print(f"Fetching contents: {url}")
              
              response = fetch_url(url)
              if not response or response == 'null':
                  print(f"No contents found")
              else:
                  try:
                      contents = json.loads(response)
                      if not isinstance(contents, list):
                          contents = [contents]
                      
                      print(f"Found {len(contents)} content(s)")
                      
                      for item in contents:
                          if isinstance(item, dict):
                              ssg = item.get('ssg', True)
                              if ssg is False or ssg == 'false':
                                  print(f"  SKIP: {item.get('code', 'unknown')} (ssg=false)")
                                  continue
                              
                              content_type = item.get('type', '')
                              payload = item.get('payload')
                              file_name = item.get('fileName')
                              code = item.get('code', '')
                              
                              if not payload:
                                  print(f"  SKIP: no payload for {code}")
                                  continue
                              
                              # Fichiers binaires
                              if content_type in ['FILE', 'PICTURE'] and isinstance(payload, str):
                                  try:
                                      file_data = base64.b64decode(payload)
                                      filename = file_name if file_name else f"{code}.bin"
                                      filepath = os.path.join(output_dir, filename)
                                      os.makedirs(os.path.dirname(filepath) if os.path.dirname(filepath) else output_dir, exist_ok=True)
                                      with open(filepath, 'wb') as f:
                                          f.write(file_data)
                                      print(f"  SAVED FILE: {filepath}")
                                  except Exception as e:
                                      print(f"  ERROR decoding: {e}")
                                  continue
                              
                              # Nom du fichier
                              if file_name:
                                  filename = file_name
                              else:
                                  ext = content_type.lower()
                                  if ext == 'style':
                                      ext = 'css'
                                  elif ext == 'script':
                                      ext = 'js'
                                  else:
                                      ext = ext.lower()
                                  filename = f"{code}.{ext}"
                              
                              save_content(payload, output_dir, filename)
                          else:
                              print(f"  SKIP: not a dict")
                  except json.JSONDecodeError as e:
                      print(f"Error parsing contents: {e}")
              
              # 2. Récupérer les sous-nœuds
              url = f"{API_URL}/nodes/parent/{node_code}"
              print(f"Fetching child nodes: {url}")
              
              response = fetch_url(url)
              if not response or response == 'null' or response == '[]':
                  print(f"No child nodes found")
                  return
              
              try:
                  nodes = json.loads(response)
                  if not isinstance(nodes, list):
                      nodes = [nodes]
                  
                  print(f"Found {len(nodes)} child node(s)")
                  
                  for node in nodes:
                      child_code = node.get('code')
                      child_folder = node.get('folder')
                      node_name = node.get('name', child_code)
                      node_ssg = node.get('ssg', True)
                      
                      if not child_code:
                          continue
                      
                      if node_ssg is False or node_ssg == 'false':
                          print(f"  SKIP node: {node_name} ({child_code}) (ssg=false)")
                          continue
                      
                      target_dir = os.path.join(output_dir, child_folder if child_folder else node_name)
                      print(f"  Child node: {node_name} ({child_code}) -> folder: {target_dir}")
                      
                      process_node(child_code, target_dir)
                      
              except json.JSONDecodeError as e:
                  print(f"Error parsing nodes: {e}")
          
          # Démarrer le traitement
          process_node(NODE_CODE, base_dir)
          
          print("\n=== SSG GENERATION COMPLETED ===")
          EOF

      - name: List generated files
        run: |
          echo "=== Generated files ==="
          find docs -type f 2>/dev/null | head -50
          echo "Total: $(find docs -type f 2>/dev/null | wc -l) files"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout headless-cms || git checkout -b headless-cms
          git add docs/
          git diff --staged --quiet || git commit -m "SSG: update from node $NODE_CODE"
          git push origin headless-cms
          echo "Push completed"
