name: CI

on:
  push:
    branches: [ "main", "feature/*, "fix/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Build and test
      run: mvn clean verify
    - name: SonarQube Scan
      run: mvn sonar:sonar -Dsonar.token=${{ secrets.SONAR_TOKEN }}
