name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    
    - name: Cache SonarQube packages
      uses: actions/cache@v3
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar
    
    # Étape 1: Build du module parent
    - name: 📦 Build itexpert-content-parent
      run: mvn -B clean install -pl itexpert-content-parent -am
    
    # Étape 2: Build du module lib
    - name: 📚 Build itexpert-content-lib
      run: mvn -B install -pl itexpert-content-lib -am
    
    # Étape 3: Build du module core
    - name: ⚙️ Build itexpert-content-core
      run: mvn -B install -pl itexpert-content-core -am
    
    # Étape 4: Build du module api
    - name: 🔌 Build itexpert-content-api
      run: mvn -B install -pl itexpert-content-api -am
    
    # Étape 5: Build du module ui
    - name: 🎨 Build itexpert-content-ui
      run: mvn -B install -pl itexpert-content-ui -am
    
    # Étape 6: Analyse SonarQube
    - name: 🔍 SonarQube Scan 
      run: |
        mvn sonar:sonar \
          -Dsonar.host.url=https://sonar.azirar.ovh \
          -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
          -Dsonar.projectKey=com.itexpert.content:itexpert-content \
          -Dsonar.projectName=ITExpert-Content \
          -Dsonar.java.binaries=**/target/classes \
          -Dsonar.sourceEncoding=UTF-8 \
          -Dsonar.ws.ignoreCertificates=true
