name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Cache SonarQube packages
      uses: actions/cache@v3
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar
    
    - name: 📦 Build itexpert-content-parent
      run: mvn -B clean install -pl itexpert-content-parent -am
    
    - name: 📚 Build itexpert-content-lib
      run: mvn -B install -pl itexpert-content-lib -am
    
    - name: ⚙️ Build itexpert-content-core
      run: mvn -B install -pl itexpert-content-core -am
    
    - name: 🔌 Build itexpert-content-api
      run: mvn -B install -pl itexpert-content-api -am
    
    - name: 🎨 Build itexpert-content-ui
      run: mvn -B install -pl itexpert-content-ui -am
    
    - name: 🔍 SonarQube Scan
      run: mvn sonar:sonar -Dsonar.token=${{ secrets.SONAR_TOKEN }}
