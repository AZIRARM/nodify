name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Cache SonarQube packages
      uses: actions/cache@v3
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar
    
    # Build du module parent (sans analyse Sonar)
    - name: 📦 Build itexpert-content-parent
      run: mvn -B clean install -pl itexpert-content-parent -am
    
    # Build et analyse du module lib
    - name: 📚 Build and analyze Nodify - Lib
      run: |
        mvn -B install -pl itexpert-content-lib -am
        mvn sonar:sonar -pl itexpert-content-lib -Dsonar.token=${{ secrets.SONAR_TOKEN }}
    
    # Build, test et analyse du module core
    - name: ⚙️ Build, test and analyze Nodify - Core
      run: |
        mvn -B install -pl itexpert-content-core -am
        mvn sonar:sonar -pl itexpert-content-core -Dsonar.token=${{ secrets.SONAR_TOKEN }}
    
    # Build et analyse du module api
    - name: 🔌 Build and analyze Nodify - API
      run: |
        mvn -B install -pl itexpert-content-api -am
        mvn sonar:sonar -pl itexpert-content-api -Dsonar.token=${{ secrets.SONAR_TOKEN }}
    
    # Build et analyse du module ui (Angular)
    - name: 🎨 Build and analyze Nodify - Studio
      run: |
        mvn -B install -pl itexpert-content-ui -am -DskipTests
        mvn sonar:sonar -pl itexpert-content-ui -Dsonar.token=${{ secrets.SONAR_TOKEN }}
