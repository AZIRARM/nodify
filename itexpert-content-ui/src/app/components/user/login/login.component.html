<div class="login-page">

  <!-- En-tête (sans marge négative) -->
  <div class="login-header">
    <div class="header-content">
      <div class="header-left-section">
        <div class="header-icon">
          <mat-icon>login</mat-icon>
        </div>
        <div class="header-title">
          <span class="title-main">{{ "LOGIN" | translate }}</span>
        </div>
      </div>

      <div class="header-right-section">
        <button mat-stroked-button class="subscribe-btn" (click)="subscribe()">
          <mat-icon>person_add</mat-icon>
          {{ "SUBSCRIBE" | translate }}
        </button>
      </div>
    </div>
  </div>

  <!-- Contenu principal (avec espace pour le footer) -->
  <div class="login-content">

    <!-- Indicateur de chargement -->
    @if (isLoading()) {
    <div class="loading-container">
      <mat-spinner diameter="40"></mat-spinner>
      <p>{{ 'LOADING' | translate }}</p>
    </div>
    }

    <!-- Carte de connexion -->
    @if (!isLoading()) {
    <div class="login-card">
      <!-- Logo -->
      <div class="logo-container">
        <img src="assets/pictures/logos/nodify_transparent.png" alt="{{ 'LOGIN' | translate }}">
      </div>

      <!-- Formulaire -->
      <div class="form-container">
        <!-- Champ Email -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>{{ "EMAIL" | translate }}</mat-label>
          <input matInput type="email" [(ngModel)]="userLogin().email" [placeholder]="'EMAIL' | translate" required
            (keydown.enter)="login()">
          <mat-icon matSuffix>email</mat-icon>
        </mat-form-field>

        <!-- Champ Mot de passe -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>{{ "USER_PASSWORD" | translate }}</mat-label>
          <input matInput [type]="hidePassword ? 'password' : 'text'" [(ngModel)]="userLogin().password"
            [placeholder]="'USER_PASSWORD' | translate" required (keydown.enter)="login()">
          <mat-icon matSuffix (click)="hidePassword = !hidePassword" style="cursor: pointer">
            {{hidePassword ? 'visibility_off' : 'visibility'}}
          </mat-icon>
        </mat-form-field>
      </div>

      <!-- Actions -->
      <div class="login-actions">
        <button mat-stroked-button class="cancel-btn" (click)="cancel()">
          <mat-icon>close</mat-icon>
          {{ "CANCEL" | translate }}
        </button>
        <button mat-flat-button class="login-btn" (click)="login()"
          [disabled]="!userLogin().email || !userLogin().password || isLoading()">
          <mat-icon>login</mat-icon>
          {{ "LOGIN" | translate }}
        </button>
      </div>
    </div>
    }
  </div>
</div>
