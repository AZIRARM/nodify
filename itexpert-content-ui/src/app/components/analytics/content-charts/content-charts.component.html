<div class="analytics-dialog">

  <div class="dialog-header">
    <div class="header-content">
      <div class="header-icon">
        <mat-icon>analytics</mat-icon>
      </div>
      <div class="header-title">
        <span class="title-main">{{ "ANALYTICS" | translate }}</span>
      </div>
    </div>
  </div>

  <div class="dialog-content">

    @if (chartOptions()?.series) {
    <div class="chart-card">

      <div class="chart-header">
        <mat-icon>share</mat-icon>
        <h3>{{ "CONTENT_TREE" | translate }}</h3>
      </div>

      <div class="chart-container">
        <div echarts [options]="chartOptions()" class="echarts-instance" [style.width]="'100%'" [style.height]="'100%'">
        </div>
      </div>

    </div>
    }

    @if (!chartOptions() || !chartOptions()?.series) {
    <div class="empty-state">
      <mat-icon>insert_chart_outlined</mat-icon>
      <p>{{ "NO_CHART_DATA" | translate }}</p>
    </div>
    }

  </div>
</div>
