<!-- footer.component.html -->
<footer class="app-footer"
        [class.visible]="isFooterVisible"
        (mouseenter)="onMouseEnter()"
        (mouseleave)="onMouseLeave()">
  <div class="footer-content">
    <div class="footer-logo">
      <img src="assets/pictures/logos/nodify_transparent.png" alt="Nodify" class="footer-logo-img">
      <div class="footer-text">
        <span class="footer-title"><b>Nodify</b></span>
        <span class="footer-subtitle">Versatile, Multilingual and collaborative Headless CMS.</span>
      </div>
    </div>
    <div class="footer-copyright">
      © {{ currentYear }} Nodify. All rights reserved.
    </div>
  </div>
</footer>
