<div class="content-code-html">
  @if (contentNode.type === 'HTML') {
  <div class="title-row">
    <app-content-code-title [title]="'HTML'" [dialogRef]="dialogRef"></app-content-code-title>
  </div>

  <div class="infos-section">
    <app-content-code-infos [contentNode]="contentNode"></app-content-code-infos>
  </div>

  <div class="code-toolbar">
    <div class="toggle-buttons">
      @if (code()) {
      <button mat-icon-button class="toggle-btn" [class.active]="code()" (click)="setCodeEdition(false)"
        [matTooltip]="'CODE' | translate">
        <mat-icon>code</mat-icon>
      </button>
      }
      @if (!code()) {
      <button mat-icon-button class="toggle-btn" [class.active]="!code()" (click)="setCodeEdition(true)"
        [matTooltip]="'HTML' | translate">
        <mat-icon>html</mat-icon>
      </button>
      }
    </div>

    <div class="spacer"></div>

    <button class="fullscreen-btn" (click)="toggleFullscreen()"
      [matTooltip]="(isFullscreen() ? 'QUITTER' : 'PLEIN ÉCRAN') | translate">
      <mat-icon>{{ isFullscreen() ? 'fullscreen_exit' : 'fullscreen' }}</mat-icon>
    </button>
  </div>

  <div class="code-editor-wrapper" [class.fullscreen]="isFullscreen()">

    @if (isFullscreen()) {
    <button class="fullscreen-close-btn" (click)="toggleFullscreen()" [matTooltip]="'QUITTER' | translate">
      <mat-icon>close</mat-icon>
    </button>
    }

    @if (code()) {
    <ngx-codemirror #codeMirror class="code-editor" [(ngModel)]="contentNode.content" [options]="{
            lineNumbers: true,
            theme: 'material',
            mode: 'htmlmixed',
            autoRefresh: true,
            lineWrapping: true,
            scrollbarStyle: 'native'
          }">
    </ngx-codemirror>
    }

    @if (!code() && contentFilled) {
    <div class="html-viewer" [innerHTML]="contentFilled">
    </div>
    }

  </div>
  }
</div>
