<div class="validation-dialog">

  <!-- En-tête simplifié sans icône dans le header -->
  <div class="dialog-header">
    <div class="header-content">
      <div class="header-title">
        <span class="title-main">{{ title | translate }}</span>
      </div>
    </div>
    <button mat-icon-button class="close-btn" (click)="cancel()">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <!-- Contenu centré avec logo et message -->
  <div mat-dialog-content class="dialog-content">
    <div class="validation-content">

      <!-- Logo Nodify -->
      <div class="logo-container">
        <img src="assets/pictures/logos/nodify_transparent.png" alt="{{ title | translate }}">
      </div>

      <!-- Message -->
      <div class="message-container">
        @if (isHtml) {
        <div [innerHTML]="message | translate"></div>
        } @else {
        <p [translate]="message"></p>
        }
      </div>

    </div>
  </div>

  <!-- Actions avec boutons stylisés -->
  <div mat-dialog-actions class="dialog-actions">
    <button mat-stroked-button class="cancel-btn" (click)="cancel()">
      <mat-icon>close</mat-icon>
      {{ "NO" | translate }}
    </button>
    <button mat-flat-button class="save-btn" (click)="validate()">
      <mat-icon>check</mat-icon>
      {{ "YES" | translate }}
    </button>
  </div>
</div>
